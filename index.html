<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staffera — Get Noticed</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8faf9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .bg-logo {
      position: fixed;
      width: 700px;
      opacity: 0.04;
      transform: rotate(-12deg);
    }

    .container {
      text-align: center;
      max-width: 500px;
      width: 90%;
      z-index: 2;
    }

    .logo {
      width: 160px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 2.2rem;
      color: #14532d;
      margin-bottom: 10px;
    }

    p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    button {
      padding: 12px;
      border: none;
      background: #14532d;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    button:hover {
      background: #0f3d22;
    }

    .note {
      font-size: 0.75rem;
      color: #888;
      margin-top: 10px;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.75rem;
      color: #aaa;
    }
  </style>
</head>

<body>

  <img src="logo.png" class="bg-logo">

  <div class="container">

    <img src="logo.png" class="logo">

    <h1>Get Noticed. Get Hired.</h1>

    <p>
      Built for skilled professionals in Canada struggling to break into their field.<br>
      Submit your profile — we help you get seen by the right employers.
    </p>

    <form action="https://formsubmit.co/hire@staffera.ca" method="POST" enctype="multipart/form-data">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="text" name="linkedin" placeholder="LinkedIn Profile URL" required>
      <input type="file" name="resume" accept=".pdf,.doc,.docx" required>

      <!-- settings -->
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Candidate - Staffera">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_next" value="https://staffera.ca/thanks.html">

      <button type="submit">Submit Your Profile</button>

    </form>

    <div class="note">
      Your information stays private. No spam.
    </div>

    <div class="footer">
      © 2026 Staffera
    </div>

  </div>

</body>
</html>
