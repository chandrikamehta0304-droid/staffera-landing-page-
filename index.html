<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staffera — Launching Soon</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      color: #111;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 400;
      color: #555;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    form {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    input[type="email"] {
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      width: 250px;
      outline: none;
    }

    button {
      padding: 12px 18px;
      font-size: 1rem;
      border: none;
      background: #111;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #333;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.85rem;
      color: #999;
    }

    @media (max-width: 500px) {
      h1 {
        font-size: 2rem;
      }

      input[type="email"] {
        width: 100%;
      }

      form {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Staffera</h1>
    <h2>
      Helping skilled immigrants get seen, hired, and placed in the right roles.<br/>
      Launching soon.
    </h2>

    <!-- FORM -->
    <form action="https://formsubmit.co/hire@staffera.ca" method="POST">
      <input type="email" name="email" placeholder="Enter your email" required />
      
      <!-- Optional hidden settings -->
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Signup - Staffera">

      <button type="submit">Notify Me</button>
    </form>

    <div class="footer">
      © 2026 Staffera. All rights reserved.
    </div>
  </div>

</body>
</html>
